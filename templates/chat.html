<!DOCTYPE html>
<html lang="ur-Latn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAM AI Assistant</title>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .chat-container {
        width: 100%;
        max-width: 480px;
        height: 90vh;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .chat-header {
        background: #1a5f7a;
        color: white;
        padding: 14px 18px;
        text-align: center;
        font-weight: 600;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }
    .chat-header img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: contain;
        object-position: center;
        background: white;
        border: 2px solid white;
        padding: 3px;
    }
    .chat-messages {
        flex: 1;
        padding: 16px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: #f4f7f9;
    }
    .msg {
        max-width: 78%;
        padding: 10px 14px;
        border-radius: 14px;
        line-height: 1.4;
        font-size: 15px;
        word-wrap: break-word;
        white-space: pre-wrap;
    }
    .user {
        align-self: flex-end;
        background: #1a5f7a;
        color: white;
        border-bottom-right-radius: 4px;
    }
    .bot {
        align-self: flex-start;
        background: #e6ecf0;
        color: #1a1a1a;
        border-bottom-left-radius: 4px;
    }
    .typing {
        align-self: flex-start;
        color: #888;
        font-size: 13px;
        font-style: italic;
        padding: 4px 14px;
    }
    .chat-input {
        display: flex;
        padding: 12px;
        gap: 8px;
        border-top: 1px solid #ddd;
        background: white;
    }
    .chat-input input {
        flex: 1;
        padding: 12px 14px;
        border: 1px solid #ccc;
        border-radius: 24px;
        outline: none;
        font-size: 15px;
    }
    .chat-input button {
        background: #1a5f7a;
        color: white;
        border: none;
        border-radius: 50%;
        width: 46px;
        height: 46px;
        font-size: 18px;
        cursor: pointer;
    }
    .chat-input button:hover { background: #14495e; }
</style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <img src="{{ url_for('static', filename='logo.jpg') }}" alt="WAM logo">
        <span>WAM AI Assistant</span>
    </div>
    <div class="chat-messages" id="messages">
        <div class="msg bot">Assalam-o-Alaikum! Main WAM AI Assistant hoon. Aapki kis tarah madad kar sakta hoon?</div>
    </div>
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Apna message likhein..." autocomplete="off">
        <button id="sendBtn">&#9658;</button>
    </div>
</div>

<script>
const messagesDiv = document.getElementById('messages');
const input = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = 'msg ' + sender;
    div.textContent = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    input.value = '';
    sendBtn.disabled = true;

    const typingDiv = document.createElement('div');
    typingDiv.className = 'typing';
    typingDiv.textContent = 'Likh raha hai...';
    messagesDiv.appendChild(typingDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    try {
        const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        typingDiv.remove();

        if (data.reply) {
            addMessage(data.reply, 'bot');
        } else {
            addMessage('Error: ' + (data.error || 'Kuch masla hua'), 'bot');
        }
    } catch (err) {
        typingDiv.remove();
        addMessage('Connection mein masla hua. Dubara koshish karein.', 'bot');
    }

    sendBtn.disabled = false;
    input.focus();
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
});
</script>

</body>
</html>
