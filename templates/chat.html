<!DOCTYPE html>
<html lang="ur-Latn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAM AI Assistant</title>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .chat-container {
        width: 100%;
        max-width: 480px;
        height: 90vh;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .chat-header {
        background: #1a5f7a;
        color: white;
        padding: 14px 18px;
        text-align: center;
        font-weight: 600;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        position: relative;
    }
    .voice-toggle {
        position: absolute;
        right: 14px;
        background: rgba(255,255,255,0.15);
        border: none;
        color: white;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .voice-toggle.active {
        background: #2ecc71;
    }
    .chat-header img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: contain;
        object-position: center;
        background: white;
        border: 2px solid white;
        padding: 3px;
    }
    .chat-messages {
        flex: 1;
        padding: 16px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: #f4f7f9;
    }
    .msg {
        max-width: 78%;
        padding: 10px 14px;
        border-radius: 14px;
        line-height: 1.4;
        font-size: 15px;
        word-wrap: break-word;
        white-space: pre-wrap;
    }
    .user {
        align-self: flex-end;
        background: #1a5f7a;
        color: white;
        border-bottom-right-radius: 4px;
    }
    .bot {
        align-self: flex-start;
        background: #e6ecf0;
        color: #1a1a1a;
        border-bottom-left-radius: 4px;
        position: relative;
        padding-right: 34px;
    }
    .replay-btn {
        position: absolute;
        bottom: 6px;
        right: 8px;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 14px;
        opacity: 0.6;
        padding: 2px;
    }
    .replay-btn:hover { opacity: 1; }
    .typing {
        align-self: flex-start;
        color: #888;
        font-size: 13px;
        font-style: italic;
        padding: 4px 14px;
    }
    .chat-input {
        display: flex;
        padding: 12px;
        gap: 8px;
        border-top: 1px solid #ddd;
        background: white;
    }
    .chat-input input {
        flex: 1;
        padding: 12px 14px;
        border: 1px solid #ccc;
        border-radius: 24px;
        outline: none;
        font-size: 15px;
    }
    .chat-input button {
        background: #1a5f7a;
        color: white;
        border: none;
        border-radius: 50%;
        width: 46px;
        height: 46px;
        font-size: 18px;
        cursor: pointer;
        flex-shrink: 0;
    }
    .chat-input button:hover { background: #14495e; }
    #micBtn.listening {
        background: #e74c3c;
        animation: pulse 1s infinite;
    }
    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(231,76,60,0.5); }
        70% { box-shadow: 0 0 0 10px rgba(231,76,60,0); }
        100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
    }
</style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <img src="{{ url_for('static', filename='logo.jpg') }}" alt="WAM logo">
        <span>WAM AI Assistant</span>
        <button class="voice-toggle" id="voiceToggle" title="Bot ki awaaz on/off karein">&#128264;</button>
    </div>
    <div class="chat-messages" id="messages">
        <div class="msg bot">Assalam-o-Alaikum! Main WAM AI Assistant hoon. Aapki kis tarah madad kar sakta hoon?</div>
    </div>
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Apna message likhein ya bolein..." autocomplete="off">
        <button id="micBtn" title="Bol kar likhein">&#127908;</button>
        <button id="sendBtn">&#9658;</button>
    </div>
</div>

<script>
const messagesDiv = document.getElementById('messages');
const input = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const voiceToggle = document.getElementById('voiceToggle');

let voiceEnabled = false;

// Bot ka message bolne ka function
function speakText(text) {
    if (!('speechSynthesis' in window)) return;

    window.speechSynthesis.cancel(); // pehle se koi bol raha ho to rok do

    const utterance = new SpeechSynthesisUtterance(text);

    // Roman Urdu ke liye Hindi/Urdu awaaz best kaam karti hai agar mojood ho
    const voices = window.speechSynthesis.getVoices();
    const preferredVoice = voices.find(v => v.lang === 'hi-IN' || v.lang === 'ur-PK')
                         || voices.find(v => v.lang.startsWith('en'));
    if (preferredVoice) utterance.voice = preferredVoice;

    utterance.rate = 0.95;
    utterance.pitch = 1;
    window.speechSynthesis.speak(utterance);
}

// Speaker toggle button
voiceToggle.addEventListener('click', () => {
    voiceEnabled = !voiceEnabled;
    voiceToggle.classList.toggle('active', voiceEnabled);
    if (!voiceEnabled) window.speechSynthesis.cancel();
});

function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = 'msg ' + sender;

    const textSpan = document.createElement('span');
    textSpan.textContent = text;
    div.appendChild(textSpan);

    if (sender === 'bot') {
        const replayBtn = document.createElement('button');
        replayBtn.className = 'replay-btn';
        replayBtn.innerHTML = '&#128264;';
        replayBtn.title = 'Dobara sunein';
        replayBtn.addEventListener('click', () => speakText(text));
        div.appendChild(replayBtn);
    }

    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    input.value = '';
    sendBtn.disabled = true;

    const typingDiv = document.createElement('div');
    typingDiv.className = 'typing';
    typingDiv.textContent = 'Likh raha hai...';
    messagesDiv.appendChild(typingDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    try {
        const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        typingDiv.remove();

        if (data.reply) {
            addMessage(data.reply, 'bot');
            if (voiceEnabled) speakText(data.reply);
        } else {
            addMessage('Error: ' + (data.error || 'Kuch masla hua'), 'bot');
        }
    } catch (err) {
        typingDiv.remove();
        addMessage('Connection mein masla hua. Dubara koshish karein.', 'bot');
    }

    sendBtn.disabled = false;
    input.focus();
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
});

// ===== Speech-to-Text (mic se bol kar likhna) =====
const micBtn = document.getElementById('micBtn');
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognitionAPI) {
    const recognition = new SpeechRecognitionAPI();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'ur-PK'; // Urdu/Roman Urdu ke liye behtareen; agar support na ho to browser khud English try karega

    let isListening = false;

    micBtn.addEventListener('click', () => {
        if (isListening) {
            recognition.stop();
            return;
        }
        try {
            recognition.start();
        } catch (e) {
            // agar pehle se chal raha ho to dobara start na ho
        }
    });

    recognition.addEventListener('start', () => {
        isListening = true;
        micBtn.classList.add('listening');
        input.placeholder = 'Sun raha hoon... boliye';
    });

    recognition.addEventListener('end', () => {
        isListening = false;
        micBtn.classList.remove('listening');
        input.placeholder = 'Apna message likhein ya bolein...';
    });

    recognition.addEventListener('result', (event) => {
        const spokenText = event.results[0][0].transcript;
        input.value = spokenText;
        input.focus();
    });

    recognition.addEventListener('error', (event) => {
        isListening = false;
        micBtn.classList.remove('listening');
        input.placeholder = 'Apna message likhein ya bolein...';
    });
} else {
    // Agar browser support na kare to mic button chhupa dein
    micBtn.style.display = 'none';
}
</script>

</body>
</html>
